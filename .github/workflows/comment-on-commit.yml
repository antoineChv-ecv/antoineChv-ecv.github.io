name: Comment on Commit with Generated Image

on:
  push:
    branches:
      - main

jobs:
  comment-on-commit:
    runs-on: ubuntu-latest

    steps:
      # ─────────────────────────────────────────────
      # 1️⃣ RÉCUPÉRATION DU RUN ID DU WORKFLOW QUI GÉNÈRE L'IMAGE
      # On cherche le dernier run réussi du workflow "generate-image"
      # pour pouvoir télécharger son artefact
      # ─────────────────────────────────────────────
      - name: Get latest successful run ID
        id: get_run
        uses: actions/github-script@v6
        with:
          github-token: ${{ secrets.GITHUB_TOKEN }}
          script: |
            // Récupère les runs du workflow qui génère l'image
            const runs = await github.rest.actions.listWorkflowRuns({
              owner: context.repo.owner,
              repo: context.repo.repo,
              workflow_id: 'generate-image.yml', // ← nom de ton workflow de génération
              status: 'success',
              per_page: 1
            });

            if (runs.data.workflow_runs.length === 0) {
              core.setFailed('❌ Aucun run réussi trouvé pour generate-image.yml');
              return;
            }

            const runId = runs.data.workflow_runs[0].id;
            console.log(`✅ Run ID trouvé : ${runId}`);

            // Exporte le run ID pour l'étape suivante
            core.setOutput('run_id', runId);

      # ─────────────────────────────────────────────
      # 2️⃣ TÉLÉCHARGEMENT DE L'ARTEFACT IMAGE
      # On récupère l'artefact "image-generee" depuis
      # le run ID trouvé à l'étape précédente
      # ─────────────────────────────────────────────
      - name: Download generated image artifact
        uses: actions/download-artifact@v4
        with:
          name: image-generee
          path: ./artifacts
          run-id: ${{ steps.get_run.outputs.run_id }}
          github-token: ${{ secrets.GITHUB_TOKEN }}

      # ─────────────────────────────────────────────
      # 3️⃣ RÉCUPÉRATION DYNAMIQUE DU NOM DE FICHIER
      # ─────────────────────────────────────────────
      - name: Get image filename dynamically
        run: |
          IMAGE_FILE=$(ls ./artifacts/ | head -n 1)

          if [ -z "$IMAGE_FILE" ]; then
            echo "❌ Aucune image trouvée dans ./artifacts/"
            exit 1
          fi

          echo "✅ Image trouvée : $IMAGE_FILE"
          echo "IMAGE_FILE=$IMAGE_FILE" >> $GITHUB_ENV

      # ─────────────────────────────────────────────
      # 4️⃣ CONSTRUCTION DE L'URL DE L'IMAGE
      # ─────────────────────────────────────────────
      - name: Build image URL
        run: |
          IMAGE_URL="https://raw.githubusercontent.com/${{ github.repository }}/main/images/$IMAGE_FILE"
          echo "🔗 URL de l'image : $IMAGE_URL"
          echo "IMAGE_URL=$IMAGE_URL" >> $GITHUB_ENV

      # ─────────────────────────────────────────────
      # 5️⃣ AJOUT DU COMMENTAIRE SUR LE COMMIT
      # ─────────────────────────────────────────────
      - name: Post comment on commit
        uses: actions/github-script@v6
        with:
          github-token: ${{ secrets.GITHUB_TOKEN }}
          script: |
            const commitSha = context.sha;
            const commitMessage = context.payload.head_commit.message;
            const imageUrl = process.env.IMAGE_URL;

            const commentBody = `
            ## 🖼️ Image générée automatiquement

            **Commit :** \`${commitSha.substring(0, 7)}\`
            **Message :** ${commitMessage}

            ---

            ![Image générée](${imageUrl})

            > 🤖 Ce commentaire a été ajouté automatiquement par GitHub Actions.
            `;

            await github.rest.repos.createCommitComment({
              owner: context.repo.owner,
              repo: context.repo.repo,
              commit_sha: commitSha,
              body: commentBody.trim()
            });

            console.log(`✅ Commentaire posté sur le commit ${commitSha.substring(0, 7)}`);