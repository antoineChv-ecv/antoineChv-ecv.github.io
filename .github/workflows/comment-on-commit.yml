name: Comment on Commit with Generated Image

on:
  push:
    branches:
      - main

jobs:
  comment-on-commit:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      # ─────────────────────────────────────────────
      # 1️⃣ RÉCUPÉRATION DE LA DERNIÈRE IMAGE COMMITTÉE
      # L'image est déjà dans le repo dans images/
      # On récupère simplement le fichier le plus récent
      # ─────────────────────────────────────────────
      - name: Get latest image filename
        run: |
          # Récupère le fichier PNG le plus récent dans images/
          IMAGE_FILE=$(ls -t images/*.png 2>/dev/null | head -n 1 | xargs basename)

          if [ -z "$IMAGE_FILE" ]; then
            echo "❌ Aucune image trouvée dans images/"
            exit 1
          fi

          echo "✅ Image trouvée : $IMAGE_FILE"
          echo "IMAGE_FILE=$IMAGE_FILE" >> $GITHUB_ENV

      # ─────────────────────────────────────────────
      # 2️⃣ CONSTRUCTION DE L'URL DE L'IMAGE
      # URL raw GitHub pour afficher l'image dans le commentaire
      # ─────────────────────────────────────────────
      - name: Build image URL
        run: |
          IMAGE_URL="https://raw.githubusercontent.com/${{ github.repository }}/main/images/$IMAGE_FILE"
          echo "🔗 URL : $IMAGE_URL"
          echo "IMAGE_URL=$IMAGE_URL" >> $GITHUB_ENV

      # ─────────────────────────────────────────────
      # 3️⃣ AJOUT DU COMMENTAIRE SUR LE COMMIT
      # ─────────────────────────────────────────────
      - name: Post comment on commit
        uses: actions/github-script@v6
        with:
          github-token: ${{ secrets.GITHUB_TOKEN }}
          script: |
            const commitSha = context.sha;
            const commitMessage = context.payload.head_commit.message;
            const imageUrl = process.env.IMAGE_URL;

            const commentBody = `
            ## 🖼️ Image générée automatiquement

            **Commit :** \`${commitSha.substring(0, 7)}\`
            **Message :** ${commitMessage}

            ---

            ![Image générée](${imageUrl})

            > 🤖 Ce commentaire a été ajouté automatiquement par GitHub Actions.
            `;

            await github.rest.repos.createCommitComment({
              owner: context.repo.owner,
              repo: context.repo.repo,
              commit_sha: commitSha,
              body: commentBody.trim()
            });

            console.log(`✅ Commentaire posté sur le commit ${commitSha.substring(0, 7)}`);