name: Générer une image & déployer sur GitHub Pages

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: write
  pages: write
  id-token: write

jobs:
  generate-and-deploy:
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}

    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Générer l'image via DynaPictures
        env:
          DYNAPICTURES_API_KEY: ${{ secrets.DYNAPICTURES_API_KEY }}
          DYNAPICTURES_TEMPLATE_UID: ${{ secrets.DYNAPICTURES_TEMPLATE_UID }}
        run: |
          mkdir -p images
          MSG=$(git log -1 --pretty=%B | tr '\n' ' ')
          RESPONSE=$(curl -s -X POST "https://api.dynapictures.com/designs/$DYNAPICTURES_TEMPLATE_UID" \
            -H "Authorization: Bearer $DYNAPICTURES_API_KEY" \
            -H "Content-Type: application/json" \
            -d "{\"params\":[{\"name\":\"text3\",\"text\":\"$MSG\"}]}")
          echo "Réponse : $RESPONSE"
          URL=$(echo "$RESPONSE" | jq -r '.imageUrl // .pages[0].imageUrl')
          curl -sSL "$URL" -o "images/$(date +%Y%m%d%H%M%S).png"

      - name: Committer l'image
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add images/
          git commit -m "chore: ajout image générée" || true
          git push

      - name: Générer index.html
        run: |
          echo '<html lang="fr"><head><meta charset="utf-8"><title>Images</title></head><body>' > images/index.html
          for img in images/*.png images/*.jpg; do
            [ -e "$img" ] || continue
            echo "<img src='$(basename $img)' style='max-width:400px;margin:1rem'>" >> images/index.html
          done
          echo '</body></html>' >> images/index.html

      - uses: actions/upload-pages-artifact@v3
        with:
          path: ./images

      - name: Déployer sur GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
